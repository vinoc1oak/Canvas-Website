<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Line Field</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      touch-action: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    #menuButton {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 5;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 22px;
      backdrop-filter: blur(10px);
    }

    #panel {
      position: fixed;
      top: 66px;
      right: 14px;
      z-index: 5;
      width: 230px;
      padding: 14px;
      border-radius: 16px;
      color: white;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(12px);
      display: none;
    }

    #panel.open {
      display: block;
    }

    label {
      display: block;
      font-size: 12px;
      margin-top: 10px;
      color: #ccc;
    }

    input, button {
      width: 100%;
      margin-top: 6px;
    }

    button {
      padding: 9px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
<canvas id="canvas"></canvas>

<button id="menuButton">☰</button>

<div id="panel">
  <div class="title">LINE FIELD</div>

  <label>Line Distance</label>
  <input id="distance" type="range" min="60" max="180" value="115">

  <label>Trail Fade</label>
  <input id="fade" type="range" min="4" max="22" value="10">

  <label>Max Particles</label>
  <input id="maxParticles" type="range" min="120" max="520" value="280">

  <button id="autoBtn">Toggle Auto</button>
  <button id="clearBtn">Clear</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { alpha: false });

const menuButton = document.getElementById("menuButton");
const panel = document.getElementById("panel");
const distanceInput = document.getElementById("distance");
const fadeInput = document.getElementById("fade");
const maxParticlesInput = document.getElementById("maxParticles");
const autoBtn = document.getElementById("autoBtn");
const clearBtn = document.getElementById("clearBtn");

let w, h, dpr;
let particles = [];
let hue = 0;
let auto = false;
let frame = 0;
let lastX = null;
let lastY = null;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  w = window.innerWidth;
  h = window.innerHeight;

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
}

resize();
window.addEventListener("resize", resize);

menuButton.onclick = () => {
  panel.classList.toggle("open");
};

autoBtn.onclick = () => {
  auto = !auto;
};

clearBtn.onclick = () => {
  particles = [];
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
};

function addParticle(x, y, power = 1) {
  const maxParticles = Number(maxParticlesInput.value);
  const count = power === 1 ? 2 : 18;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = power === 1 ? Math.random() * 1.2 : Math.random() * 4.5;

    particles.push({
      x,
      y,
      px: x,
      py: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      hue: hue + Math.random() * 70
    });
  }

  if (particles.length > maxParticles) {
    particles.splice(0, particles.length - maxParticles);
  }
}

function moveInput(x, y) {
  if (lastX !== null) {
    const dx = x - lastX;
    const dy = y - lastY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 4) return;

    const steps = Math.min(6, Math.floor(dist / 16) + 1);

    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      addParticle(lastX + dx * t, lastY + dy * t, 1);
    }
  }

  lastX = x;
  lastY = y;
}

window.addEventListener("pointermove", e => {
  moveInput(e.clientX, e.clientY);
});

window.addEventListener("pointerdown", e => {
  lastX = e.clientX;
  lastY = e.clientY;
  addParticle(e.clientX, e.clientY, 4);
});

window.addEventListener("pointerup", () => {
  lastX = null;
  lastY = null;
});

function autoMotion() {
  const x = w / 2 + Math.cos(frame * 0.018) * w * 0.34 + Math.sin(frame * 0.041) * 80;
  const y = h / 2 + Math.sin(frame * 0.022) * h * 0.34 + Math.cos(frame * 0.035) * 80;
  addParticle(x, y, 1);
}

function draw() {
  frame++;
  hue += 0.65;

  const fade = Number(fadeInput.value) / 100;
  const maxDist = Number(distanceInput.value);
  const cellSize = maxDist;

  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, w, h);

  if (auto) autoMotion();

  const grid = new Map();

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    p.px = p.x;
    p.py = p.y;

    p.x += p.vx;
    p.y += p.vy;

    p.vx *= 0.985;
    p.vy *= 0.985;
    p.life -= 0.008;

    if (p.life <= 0 || p.x < -50 || p.x > w + 50 || p.y < -50 || p.y > h + 50) {
      particles.splice(i, 1);
      continue;
    }

    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);
    const key = cx + "," + cy;

    if (!grid.has(key)) grid.set(key, []);
    grid.get(key).push(p);
  }

  ctx.lineWidth = 1;
  ctx.lineCap = "round";

  for (const p of particles) {
    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `hsla(${p.hue},100%,65%,${p.life})`;
    ctx.stroke();

    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);

    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        const nearby = grid.get(gx + "," + gy);
        if (!nearby) continue;

        for (const q of nearby) {
          if (p === q) continue;

          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const distSq = dx * dx + dy * dy;
          const maxSq = maxDist * maxDist;

          if (distSq < maxSq) {
            const alpha = (1 - distSq / maxSq) * 0.32 * p.life * q.life;

            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `hsla(${(p.hue + q.hue) / 2},100%,60%,${alpha})`;
            ctx.stroke();
          }
        }
      }
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
