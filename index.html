<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Reactive Abstract Field</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #000;
  touch-action: none;
  font-family: Arial, sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  display: block;
}

#menuButton {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 10;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.22);
  background: rgba(0,0,0,0.36);
  color: white;
  font-size: 22px;
}

#panel {
  position: fixed;
  top: 66px;
  right: 14px;
  z-index: 10;
  width: 245px;
  padding: 14px;
  border-radius: 16px;
  color: white;
  background: rgba(0,0,0,0.62);
  border: 1px solid rgba(255,255,255,0.18);
  display: none;
}

#panel.open { display: block; }

label {
  display: block;
  font-size: 12px;
  margin-top: 10px;
  color: #ccc;
}

input, button {
  width: 100%;
  margin-top: 6px;
}

button {
  padding: 9px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

.title {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
}

.status {
  margin-top: 8px;
  font-size: 11px;
  color: #aaa;
  line-height: 1.35;
}

#player {
  position: fixed;
  left: 14px;
  bottom: 14px;
  z-index: 10;
  width: 260px;
  opacity: 0.78;
}
</style>
</head>

<body>
<canvas id="canvas"></canvas>

<button id="menuButton">☰</button>

<audio id="player" controls playsinline></audio>

<div id="panel">
  <div class="title">AUDIO FIELD</div>

  <label>Upload MP3</label>
  <input id="audioFile" type="file" accept="audio/*">

  <button id="playBtn">Play / Pause</button>

  <label>Visual Intensity</label>
  <input id="intensitySlider" type="range" min="60" max="160" value="100">

  <label>Trail Fade</label>
  <input id="fadeSlider" type="range" min="4" max="18" value="8">

  <label>Particle Limit</label>
  <input id="particleSlider" type="range" min="180" max="520" value="330">

  <button id="clearBtn">Clear</button>

  <div id="status" class="status">Upload an MP3, then tap Play.</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { alpha: false });

const menuButton = document.getElementById("menuButton");
const panel = document.getElementById("panel");
const audioFile = document.getElementById("audioFile");
const playBtn = document.getElementById("playBtn");
const clearBtn = document.getElementById("clearBtn");
const statusEl = document.getElementById("status");
const fadeSlider = document.getElementById("fadeSlider");
const particleSlider = document.getElementById("particleSlider");
const intensitySlider = document.getElementById("intensitySlider");
const player = document.getElementById("player");

let w, h, dpr;
let frame = 0;
let hue = 0;

let audioContext = null;
let analyser = null;
let source = null;
let frequencyData = null;
let songLoaded = false;

let bass = 0, mids = 0, highs = 0, volume = 0;
let smoothBass = 0, smoothMids = 0, smoothHighs = 0, smoothVolume = 0;
let energyHistory = [];
let beatCooldown = 0;
let buildup = 0;

const particles = [];
const rings = [];
const bolts = [];
const sparks = [];

let pointerDown = false;
let lastX = null;
let lastY = null;
let lastManualEffect = -999;

const MAX_RINGS = 30;
const MAX_BOLTS = 14;
const MAX_SPARKS = 90;
const LINE_BUDGET = 1600;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 1.6);
  w = window.innerWidth;
  h = window.innerHeight;

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
}

resize();
window.addEventListener("resize", resize);

menuButton.onclick = () => panel.classList.toggle("open");

clearBtn.onclick = () => {
  particles.length = 0;
  rings.length = 0;
  bolts.length = 0;
  sparks.length = 0;
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
};

audioFile.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);

  player.src = url;
  player.load();

  songLoaded = true;
  statusEl.textContent = "MP3 loaded. Tap Play / Pause.";
};

playBtn.onclick = async () => {
  if (!songLoaded) {
    statusEl.textContent = "Upload an MP3 first.";
    return;
  }

  try {
    if (!audioContext) {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 1024;
      analyser.smoothingTimeConstant = 0.74;

      source = audioContext.createMediaElementSource(player);
      source.connect(analyser);
      analyser.connect(audioContext.destination);

      frequencyData = new Uint8Array(analyser.frequencyBinCount);
    }

    if (audioContext.state === "suspended") {
      await audioContext.resume();
    }

    if (player.paused) {
      await player.play();
      statusEl.textContent = "Playing with audio-reactive visuals.";
    } else {
      player.pause();
      statusEl.textContent = "Paused.";
    }
  } catch (err) {
    statusEl.textContent = "Audio blocked. Tap the visible audio player, then tap Play again.";
  }
};

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function trim(arr, max) {
  if (arr.length > max) arr.splice(0, arr.length - max);
}

function capParticles() {
  const max = Number(particleSlider.value);
  if (particles.length > max) particles.splice(0, particles.length - max);
}

function addParticle(x, y, vx, vy, life, colorHue, spin = 0) {
  particles.push({
    x, y,
    px: x,
    py: y,
    vx,
    vy,
    life,
    maxLife: life,
    hue: colorHue,
    spin
  });
}

function addSpark(x, y, vx, vy, life, colorHue) {
  sparks.push({ x, y, px: x, py: y, vx, vy, life, hue: colorHue });
  trim(sparks, MAX_SPARKS);
}

function addRing(x, y, speed, colorHue, life = 1) {
  rings.push({
    x,
    y,
    r: 3,
    speed,
    life,
    hue: colorHue,
    phase: rand(0, Math.PI * 2),
    spin: Math.random() < 0.5 ? -1 : 1
  });

  trim(rings, MAX_RINGS);
}

function addFlow(x, y, amount = 1) {
  for (let i = 0; i < amount; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.25, 1.25 + smoothBass * 2);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.75, 1.25), hue + rand(0, 90));
  }
}

function bloom(x, y, power = 1) {
  const count = Math.floor(28 + power * 22);

  for (let i = 0; i < count; i++) {
    const a = Math.PI * 2 * i / count + rand(-0.06, 0.06);
    const s = rand(1.5, 4.4 + power * 2.4);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.9, 1.45), hue + i * 5);
  }

  addRing(x, y, 4.2 + power * 1.8, hue + 210, 0.9);
}

function spiral(x, y, power = 1) {
  const dir = Math.random() < 0.5 ? 1 : -1;

  for (let i = 0; i < 32; i++) {
    const a = i * 0.5 * dir;
    const s = 0.8 + i * 0.035 + power * 0.35;
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(1.1, 1.85), hue + i * 7, dir * 0.02);
  }

  addRing(x, y, 2.8 + power, hue + 60, 1);
}

function lightning(x, y, power = 1) {
  const branchCount = Math.floor(6 + power * 6);
  const baseHue = hue + rand(180, 240);

  for (let b = 0; b < branchCount; b++) {
    let cx = x;
    let cy = y;
    let angle = rand(0, Math.PI * 2);
    const length = rand(95, 170 + power * 70);
    const points = [{ x: cx, y: cy }];

    for (let i = 0; i < 8; i++) {
      angle += rand(-0.45, 0.45);
      cx += Math.cos(angle) * length / 8 + rand(-14, 14);
      cy += Math.sin(angle) * length / 8 + rand(-14, 14);
      points.push({ x: cx, y: cy });

      if (Math.random() < 0.33) {
        let sx = cx;
        let sy = cy;
        let side = angle + rand(-1.35, 1.35);
        const sub = [{ x: sx, y: sy }];

        for (let j = 0; j < 3; j++) {
          sx += Math.cos(side) * rand(14, 35);
          sy += Math.sin(side) * rand(14, 35);
          sub.push({ x: sx, y: sy });
        }

        bolts.push({
          points: sub,
          life: rand(0.45, 0.8),
          hue: baseHue + rand(-30, 30),
          width: rand(0.7, 1.3)
        });
      }
    }

    bolts.push({
      points,
      life: rand(0.65, 1),
      hue: baseHue,
      width: rand(1.2, 2.4)
    });
  }

  for (let i = 0; i < 32 + power * 28; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(2.6, 7.5 + power * 2);
    addSpark(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.35, 0.85), baseHue + rand(-60, 60));
  }

  addRing(x, y, 6.5 + power * 2, baseHue, 0.65);
  trim(bolts, MAX_BOLTS);
}

function randomEffect(x, y, power = 1) {
  const r = Math.random();

  if (r < 0.35) bloom(x, y, power);
  else if (r < 0.68) spiral(x, y, power);
  else lightning(x, y, power);

  capParticles();
}

function analyzeAudio() {
  if (!analyser || player.paused) {
    smoothBass *= 0.94;
    smoothMids *= 0.94;
    smoothHighs *= 0.94;
    smoothVolume *= 0.94;
    buildup *= 0.97;
    return false;
  }

  analyser.getByteFrequencyData(frequencyData);

  let b = 0;
  let m = 0;
  let hi = 0;
  let total = 0;

  for (let i = 0; i < frequencyData.length; i++) {
    const v = frequencyData[i] / 255;
    total += v;

    if (i < 12) b += v;
    else if (i < 90) m += v;
    else hi += v;
  }

  bass = b / 12;
  mids = m / 78;
  highs = hi / (frequencyData.length - 90);
  volume = total / frequencyData.length;

  smoothBass = smoothBass * 0.78 + bass * 0.22;
  smoothMids = smoothMids * 0.84 + mids * 0.16;
  smoothHighs = smoothHighs * 0.78 + highs * 0.22;
  smoothVolume = smoothVolume * 0.86 + volume * 0.14;

  const energy = bass * 0.9 + volume * 0.7 + highs * 0.25;
  energyHistory.push(energy);
  if (energyHistory.length > 70) energyHistory.shift();

  let avg = 0;
  for (let i = 0; i < energyHistory.length; i++) avg += energyHistory[i];
  avg /= energyHistory.length || 1;

  buildup = buildup * 0.985 + Math.max(0, energy - avg) * 0.16 + smoothVolume * 0.008;
  buildup = Math.min(1.5, buildup);

  beatCooldown--;

  const beat = beatCooldown <= 0 && bass > Math.max(0.18, avg * 1.28);

  if (beat) beatCooldown = 13;

  return beat;
}

function audioVisuals(beat) {
  if (player.paused) return;

  const power = Math.min(2.8, 0.8 + smoothBass * 2.8 + buildup);
  const cx = w / 2 + Math.cos(frame * 0.012) * w * 0.28;
  const cy = h / 2 + Math.sin(frame * 0.014) * h * 0.28;

  if (frame % 2 === 0) {
    addFlow(cx + rand(-90, 90), cy + rand(-90, 90), smoothHighs > 0.22 ? 2 : 1);
  }

  if (beat) {
    randomEffect(rand(w * 0.16, w * 0.84), rand(h * 0.16, h * 0.84), power);
  }

  if (smoothBass > 0.34 && frame % 36 === 0) {
    bloom(rand(w * 0.18, w * 0.82), rand(h * 0.18, h * 0.82), power);
  }

  if (buildup > 0.55 && frame % 52 === 0) {
    lightning(rand(w * 0.18, w * 0.82), rand(h * 0.18, h * 0.82), power);
  }

  capParticles();
}

function manualMove(x, y) {
  if (lastX !== null) {
    const dx = x - lastX;
    const dy = y - lastY;
    const dist = Math.hypot(dx, dy);

    if (dist > 5) {
      const steps = Math.min(4, Math.floor(dist / 24) + 1);

      for (let i = 0; i < steps; i++) {
        const t = i / steps;
        addFlow(lastX + dx * t, lastY + dy * t, 1);
      }

      if (pointerDown && frame - lastManualEffect > 16 && Math.random() < 0.08) {
        randomEffect(x, y, 1);
        lastManualEffect = frame;
      }

      capParticles();
    }
  }

  lastX = x;
  lastY = y;
}

window.addEventListener("pointerdown", e => {
  if (e.target.closest("#panel") || e.target.closest("#menuButton") || e.target.closest("#player")) return;

  pointerDown = true;
  lastX = e.clientX;
  lastY = e.clientY;
  randomEffect(e.clientX, e.clientY, 1);
});

window.addEventListener("pointermove", e => {
  if (e.target.closest("#panel") || e.target.closest("#menuButton") || e.target.closest("#player")) return;
  manualMove(e.clientX, e.clientY);
});

window.addEventListener("pointerup", () => {
  pointerDown = false;
  lastX = null;
  lastY = null;
});

window.addEventListener("pointercancel", () => {
  pointerDown = false;
  lastX = null;
  lastY = null;
});

function drawBackground() {
  const fade = Number(fadeSlider.value) / 100;
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, w, h);

  const glow = 0.035 + smoothBass * 0.12 + buildup * 0.035;

  if (frame % 2 === 0) {
    const g = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.55);
    g.addColorStop(0, `hsla(${hue + 160},100%,32%,${glow})`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }
}

function drawRings() {
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];

    r.r += r.speed * (1 + smoothBass * 0.7);
    r.life -= 0.009;

    if (r.life <= 0 || r.r > Math.max(w, h) * 0.75) {
      rings[i] = rings[rings.length - 1];
      rings.pop();
      continue;
    }

    const wobble = Math.sin(frame * 0.035 + r.phase) * (8 + smoothMids * 15);

    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r + wobble, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${r.hue},100%,64%,${r.life * 0.52})`;
    ctx.lineWidth = 1.3 + smoothBass;
    ctx.stroke();

    const start = frame * 0.035 * r.spin + r.phase;

    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r * 0.64, start, start + Math.PI * 1.35);
    ctx.strokeStyle = `hsla(${r.hue + 85},100%,60%,${r.life * 0.3})`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawBolts() {
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];
    b.life -= 0.052;

    if (b.life <= 0) {
      bolts[i] = bolts[bolts.length - 1];
      bolts.pop();
      continue;
    }

    ctx.beginPath();
    ctx.moveTo(b.points[0].x, b.points[0].y);

    for (let j = 1; j < b.points.length; j++) {
      const p = b.points[j];
      ctx.lineTo(p.x + rand(-2, 2), p.y + rand(-2, 2));
    }

    ctx.strokeStyle = `hsla(${b.hue},100%,72%,${b.life * 0.75})`;
    ctx.lineWidth = b.width + smoothBass;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(b.points[0].x, b.points[0].y);

    for (let j = 1; j < b.points.length; j++) {
      const p = b.points[j];
      ctx.lineTo(p.x + rand(-0.8, 0.8), p.y + rand(-0.8, 0.8));
    }

    ctx.strokeStyle = `rgba(255,255,255,${b.life * 0.42})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}

function drawSparks() {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];

    s.px = s.x;
    s.py = s.y;
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.94;
    s.vy *= 0.94;
    s.life -= 0.036;

    if (s.life <= 0) {
      sparks[i] = sparks[sparks.length - 1];
      sparks.pop();
      continue;
    }

    ctx.beginPath();
    ctx.moveTo(s.px, s.py);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = `hsla(${s.hue},100%,70%,${s.life})`;
    ctx.lineWidth = 1.15;
    ctx.stroke();
  }
}

function drawParticlesAndLinks() {
  const baseDist = 112 * (Number(intensitySlider.value) / 100);
  const maxDist = baseDist * (1 + smoothMids * 0.25);
  const maxSq = maxDist * maxDist;
  const cellSize = maxDist;
  const grid = new Map();

  let write = 0;

  for (let read = 0; read < particles.length; read++) {
    const p = particles[read];

    p.px = p.x;
    p.py = p.y;

    if (p.spin) {
      const c = Math.cos(p.spin);
      const s = Math.sin(p.spin);
      const vx = p.vx * c - p.vy * s;
      const vy = p.vx * s + p.vy * c;
      p.vx = vx;
      p.vy = vy;
    }

    p.x += p.vx * (1 + smoothBass * 0.24);
    p.y += p.vy * (1 + smoothBass * 0.24);
    p.vx *= 0.989;
    p.vy *= 0.989;
    p.life -= 0.0062;

    if (p.life > 0 && p.x > -100 && p.x < w + 100 && p.y > -100 && p.y < h + 100) {
      particles[write] = p;

      const key = Math.floor(p.x / cellSize) + "," + Math.floor(p.y / cellSize);
      let bucket = grid.get(key);

      if (!bucket) {
        bucket = [];
        grid.set(key, bucket);
      }

      bucket.push(write);
      write++;
    }
  }

  particles.length = write;

  let lineCount = 0;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const a = Math.min(1, p.life / p.maxLife);

    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `hsla(${p.hue},100%,64%,${a * 0.72})`;
    ctx.lineWidth = 1;
    ctx.stroke();

    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);

    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        const bucket = grid.get(gx + "," + gy);
        if (!bucket) continue;

        for (let k = 0; k < bucket.length; k++) {
          const j = bucket[k];
          if (j <= i) continue;

          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const distSq = dx * dx + dy * dy;

          if (distSq < maxSq) {
            const alpha = (1 - distSq / maxSq) * 0.24 * p.life * q.life;

            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `hsla(${(p.hue + q.hue) / 2},100%,60%,${alpha})`;
            ctx.lineWidth = 1;
            ctx.stroke();

            lineCount++;
            if (lineCount > LINE_BUDGET) return;
          }
        }
      }
    }
  }
}

function draw() {
  frame++;
  hue = (hue + 0.42 + smoothHighs * 1.4) % 360;

  const beat = analyzeAudio();

  drawBackground();
  audioVisuals(beat);

  drawRings();
  drawBolts();
  drawSparks();
  drawParticlesAndLinks();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
