<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Abstract Field</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      font-family: Arial, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    #menuButton {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.34);
      color: white;
      font-size: 22px;
      backdrop-filter: blur(10px);
    }

    #panel {
      position: fixed;
      top: 66px;
      right: 14px;
      z-index: 10;
      width: 230px;
      padding: 14px;
      border-radius: 16px;
      color: white;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(12px);
      display: none;
    }

    #panel.open { display: block; }

    label {
      display: block;
      font-size: 12px;
      margin-top: 10px;
      color: #ccc;
    }

    input, button {
      width: 100%;
      margin-top: 6px;
    }

    button {
      padding: 9px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
    }

    .title {
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
  </style>
</head>

<body>
<canvas id="canvas"></canvas>

<button id="menuButton">☰</button>

<div id="panel">
  <div class="title">LIVING FIELD</div>

  <label>Line Distance</label>
  <input id="distance" type="range" min="70" max="170" value="115">

  <label>Trail Fade</label>
  <input id="fade" type="range" min="4" max="18" value="8">

  <label>Particle Limit</label>
  <input id="maxParticles" type="range" min="180" max="520" value="340">

  <button id="autoBtn">Toggle Auto</button>
  <button id="clearBtn">Clear</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { alpha: false });

const menuButton = document.getElementById("menuButton");
const panel = document.getElementById("panel");
const distanceInput = document.getElementById("distance");
const fadeInput = document.getElementById("fade");
const maxParticlesInput = document.getElementById("maxParticles");
const autoBtn = document.getElementById("autoBtn");
const clearBtn = document.getElementById("clearBtn");

let w = 0;
let h = 0;
let dpr = 1;
let frame = 0;
let hue = 0;
let auto = false;
let pointerDown = false;
let lastX = null;
let lastY = null;
let lastEffectFrame = -999;

const particles = [];
const forms = [];
const bolts = [];
const sparks = [];

const MAX_FORMS = 34;
const MAX_BOLTS = 16;
const MAX_SPARKS = 80;
const LINE_BUDGET = 1900;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 1.75);
  w = window.innerWidth;
  h = window.innerHeight;

  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
}

resize();
window.addEventListener("resize", resize);

menuButton.onclick = () => panel.classList.toggle("open");
autoBtn.onclick = () => auto = !auto;

clearBtn.onclick = () => {
  particles.length = 0;
  forms.length = 0;
  bolts.length = 0;
  sparks.length = 0;
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, w, h);
};

function rand(min, max) {
  return min + Math.random() * (max - min);
}

function trimArray(arr, max) {
  if (arr.length > max) arr.splice(0, arr.length - max);
}

function capParticles() {
  const max = Number(maxParticlesInput.value);
  if (particles.length > max) particles.splice(0, particles.length - max);
}

function addParticle(x, y, vx, vy, life, colorHue, size = 1, spin = 0, gravity = 0) {
  particles.push({
    x, y, px: x, py: y,
    vx, vy,
    life,
    maxLife: life,
    hue: colorHue,
    size,
    spin,
    gravity
  });
}

function addSpark(x, y, vx, vy, life, colorHue) {
  sparks.push({ x, y, px: x, py: y, vx, vy, life, hue: colorHue });
  trimArray(sparks, MAX_SPARKS);
}

function addFlow(x, y, amount = 1) {
  for (let i = 0; i < amount; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.25, 1.25);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.8, 1.25), hue + rand(0, 80), 1);
  }
}

function addRing(x, y, colorHue, speed = 3.2, life = 1) {
  forms.push({
    type: "ring",
    x, y,
    r: 3,
    speed,
    life,
    hue: colorHue,
    phase: rand(0, Math.PI * 2)
  });
  trimArray(forms, MAX_FORMS);
}

function addArc(x, y, colorHue, spin = 1, radius = 12) {
  forms.push({
    type: "arc",
    x, y,
    r: radius,
    speed: rand(1.2, 2.9),
    life: 1,
    hue: colorHue,
    spin,
    phase: rand(0, Math.PI * 2)
  });
  trimArray(forms, MAX_FORMS);
}

function spiralEffect(x, y) {
  const dir = Math.random() < 0.5 ? 1 : -1;

  for (let i = 0; i < 30; i++) {
    const a = i * 0.52 * dir;
    const s = 0.7 + i * 0.033;
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(1.1, 1.8), hue + i * 7, 1, dir * 0.018);
  }

  addArc(x, y, hue + 40, dir, 10);
}

function bloomEffect(x, y) {
  const count = 42;

  for (let i = 0; i < count; i++) {
    const a = Math.PI * 2 * i / count + rand(-0.05, 0.05);
    const s = rand(1.4, 4.1);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.9, 1.45), hue + i * 5, 1.1);
  }

  addRing(x, y, hue + 210, 4.2, 1);
}

function orbitEffect(x, y) {
  for (let i = 0; i < 3; i++) {
    addArc(x, y, hue + i * 45, i % 2 ? -1 : 1, 20 + i * 18);
  }

  for (let i = 0; i < 26; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.8, 2.3);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(1.2, 1.9), hue + 110 + i * 4, 1, rand(-0.022, 0.022));
  }
}

function novaEffect(x, y) {
  addRing(x, y, hue + 300, 5.8, 0.9);

  for (let i = 0; i < 54; i++) {
    const a = Math.PI * 2 * i / 54;
    const s = rand(2.2, 5.2);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.85, 1.25), hue + i * 3, 1.2);
  }
}

function vortexEffect(x, y) {
  const dir = Math.random() < 0.5 ? 1 : -1;

  for (let i = 0; i < 40; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(0.4, 2.2);
    addParticle(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(1.3, 2.2), hue + rand(20, 160), 1, dir * rand(0.02, 0.045));
  }

  addArc(x, y, hue + 140, dir, 16);
  addArc(x, y, hue + 210, -dir, 36);
}

function cometEffect(x, y) {
  const a = rand(0, Math.PI * 2);
  const tail = 32;

  for (let i = 0; i < tail; i++) {
    const t = i / tail;
    const px = x - Math.cos(a) * i * 3;
    const py = y - Math.sin(a) * i * 3;
    const s = 2.6 * (1 - t);
    addParticle(px, py, Math.cos(a) * s + rand(-0.4, 0.4), Math.sin(a) * s + rand(-0.4, 0.4), rand(0.9, 1.5), hue + 40 + i * 4, 1);
  }

  addRing(x, y, hue + 60, 3.1, 0.7);
}

function lightningEffect(x, y) {
  const branches = 9;
  const baseHue = hue + rand(175, 240);

  for (let b = 0; b < branches; b++) {
    const points = [];
    let cx = x;
    let cy = y;
    let angle = rand(0, Math.PI * 2);
    const length = rand(90, 180);
    const steps = 8;

    points.push({ x: cx, y: cy });

    for (let i = 1; i <= steps; i++) {
      const power = i / steps;
      angle += rand(-0.34, 0.34);
      const segment = length / steps;

      cx += Math.cos(angle) * segment + rand(-13, 13);
      cy += Math.sin(angle) * segment + rand(-13, 13);

      points.push({ x: cx, y: cy });

      if (Math.random() < 0.34 && i > 2) {
        const side = angle + rand(-1.2, 1.2);
        const sx = cx;
        const sy = cy;
        const sub = [{ x: sx, y: sy }];
        let bx = sx;
        let by = sy;

        for (let j = 0; j < 3; j++) {
          bx += Math.cos(side) * rand(12, 26) + rand(-8, 8);
          by += Math.sin(side) * rand(12, 26) + rand(-8, 8);
          sub.push({ x: bx, y: by });
        }

        bolts.push({
          points: sub,
          life: rand(0.55, 0.85),
          hue: baseHue + rand(-25, 25),
          width: rand(0.7, 1.3)
        });
      }
    }

    bolts.push({
      points,
      life: rand(0.65, 1),
      hue: baseHue + rand(-18, 18),
      width: rand(1.1, 2.2)
    });
  }

  for (let i = 0; i < 44; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(2.5, 6.3);
    addSpark(x, y, Math.cos(a) * s, Math.sin(a) * s, rand(0.35, 0.85), baseHue + rand(-50, 50));
  }

  addRing(x, y, baseHue, 6.4, 0.7);
  trimArray(bolts, MAX_BOLTS);
}

function randomEffect(x, y, force = false) {
  if (!force && frame - lastEffectFrame < 14) return;
  lastEffectFrame = frame;

  const r = Math.random();

  if (r < 0.18) spiralEffect(x, y);
  else if (r < 0.34) bloomEffect(x, y);
  else if (r < 0.49) orbitEffect(x, y);
  else if (r < 0.63) novaEffect(x, y);
  else if (r < 0.77) vortexEffect(x, y);
  else if (r < 0.89) cometEffect(x, y);
  else lightningEffect(x, y);

  capParticles();
}

function moveInput(x, y) {
  if (lastX !== null) {
    const dx = x - lastX;
    const dy = y - lastY;
    const dist = Math.hypot(dx, dy);

    if (dist < 5) return;

    const steps = Math.min(4, Math.floor(dist / 22) + 1);

    for (let i = 0; i < steps; i++) {
      const t = i / steps;
      const px = lastX + dx * t;
      const py = lastY + dy * t;

      addFlow(px, py, 1);

      if (pointerDown && Math.random() < 0.045) {
        randomEffect(px, py, false);
      }
    }

    capParticles();
  }

  lastX = x;
  lastY = y;
}

window.addEventListener("pointerdown", e => {
  pointerDown = true;
  lastX = e.clientX;
  lastY = e.clientY;
  randomEffect(e.clientX, e.clientY, true);
});

window.addEventListener("pointermove", e => {
  moveInput(e.clientX, e.clientY);
});

window.addEventListener("pointerup", () => {
  pointerDown = false;
  lastX = null;
  lastY = null;
});

window.addEventListener("pointercancel", () => {
  pointerDown = false;
  lastX = null;
  lastY = null;
});

function autoMotion() {
  const x = w / 2 + Math.cos(frame * 0.013) * w * 0.34 + Math.sin(frame * 0.031) * 80;
  const y = h / 2 + Math.sin(frame * 0.017) * h * 0.34 + Math.cos(frame * 0.027) * 80;

  if (frame % 3 === 0) addFlow(x, y, 1);
  if (frame % 190 === 0) randomEffect(x, y, true);
}

function drawForms() {
  ctx.lineCap = "round";

  for (let i = forms.length - 1; i >= 0; i--) {
    const f = forms[i];

    f.r += f.speed;
    f.life -= 0.0085;

    if (f.life <= 0 || f.r > Math.max(w, h) * 0.75) {
      forms[i] = forms[forms.length - 1];
      forms.pop();
      continue;
    }

    const wobble = Math.sin(frame * 0.04 + f.phase) * 8;
    const alpha = f.life;

    if (f.type === "ring") {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r + wobble, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${f.hue},100%,64%,${alpha * 0.54})`;
      ctx.lineWidth = 1.35;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * 0.47, 0, Math.PI * 2);
      ctx.strokeStyle = `hsla(${f.hue + 80},100%,58%,${alpha * 0.24})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    } else {
      const start = frame * 0.034 * f.spin + f.phase;
      const span = Math.PI * (1.05 + 0.28 * Math.sin(frame * 0.027 + f.phase));

      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r + wobble * 0.4, start, start + span);
      ctx.strokeStyle = `hsla(${f.hue},100%,65%,${alpha * 0.52})`;
      ctx.lineWidth = 1.3;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r * 0.62, -start, -start + span * 0.72);
      ctx.strokeStyle = `hsla(${f.hue + 95},100%,60%,${alpha * 0.28})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

function drawBolts() {
  for (let i = bolts.length - 1; i >= 0; i--) {
    const b = bolts[i];

    b.life -= 0.05;

    if (b.life <= 0) {
      bolts[i] = bolts[bolts.length - 1];
      bolts.pop();
      continue;
    }

    ctx.beginPath();
    ctx.moveTo(b.points[0].x, b.points[0].y);

    for (let j = 1; j < b.points.length; j++) {
      const p = b.points[j];
      ctx.lineTo(p.x + rand(-2, 2), p.y + rand(-2, 2));
    }

    ctx.strokeStyle = `hsla(${b.hue},100%,72%,${b.life * 0.78})`;
    ctx.lineWidth = b.width;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(b.points[0].x, b.points[0].y);

    for (let j = 1; j < b.points.length; j++) {
      const p = b.points[j];
      ctx.lineTo(p.x + rand(-1, 1), p.y + rand(-1, 1));
    }

    ctx.strokeStyle = `rgba(255,255,255,${b.life * 0.46})`;
    ctx.lineWidth = 0.55;
    ctx.stroke();
  }
}

function drawSparks() {
  ctx.lineCap = "round";

  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];

    s.px = s.x;
    s.py = s.y;
    s.x += s.vx;
    s.y += s.vy;
    s.vx *= 0.94;
    s.vy *= 0.94;
    s.life -= 0.035;

    if (s.life <= 0) {
      sparks[i] = sparks[sparks.length - 1];
      sparks.pop();
      continue;
    }

    ctx.beginPath();
    ctx.moveTo(s.px, s.py);
    ctx.lineTo(s.x, s.y);
    ctx.strokeStyle = `hsla(${s.hue},100%,70%,${s.life})`;
    ctx.lineWidth = 1.15;
    ctx.stroke();
  }
}

function updateParticles(grid, cellSize) {
  let write = 0;

  for (let read = 0; read < particles.length; read++) {
    const p = particles[read];

    p.px = p.x;
    p.py = p.y;

    if (p.spin) {
      const c = Math.cos(p.spin);
      const s = Math.sin(p.spin);
      const vx = p.vx * c - p.vy * s;
      const vy = p.vx * s + p.vy * c;
      p.vx = vx;
      p.vy = vy;
    }

    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.989;
    p.vy *= 0.989;
    p.life -= 0.006;

    if (p.life > 0 && p.x > -100 && p.x < w + 100 && p.y > -100 && p.y < h + 100) {
      particles[write++] = p;

      const key = Math.floor(p.x / cellSize) + "," + Math.floor(p.y / cellSize);
      let bucket = grid.get(key);
      if (!bucket) {
        bucket = [];
        grid.set(key, bucket);
      }
      bucket.push(write - 1);
    }
  }

  particles.length = write;
}

function drawParticlesAndLinks() {
  const maxDist = Number(distanceInput.value);
  const maxSq = maxDist * maxDist;
  const cellSize = maxDist;
  const grid = new Map();

  updateParticles(grid, cellSize);

  ctx.lineCap = "round";
  ctx.lineWidth = 1;

  let lineCount = 0;

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const alpha = Math.min(1, p.life / p.maxLife);

    ctx.beginPath();
    ctx.moveTo(p.px, p.py);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `hsla(${p.hue},100%,64%,${alpha * 0.72})`;
    ctx.stroke();

    const cx = Math.floor(p.x / cellSize);
    const cy = Math.floor(p.y / cellSize);

    for (let gx = cx - 1; gx <= cx + 1; gx++) {
      for (let gy = cy - 1; gy <= cy + 1; gy++) {
        const bucket = grid.get(gx + "," + gy);
        if (!bucket) continue;

        for (let k = 0; k < bucket.length; k++) {
          const j = bucket[k];

          if (j <= i) continue;

          const q = particles[j];
          const dx = p.x - q.x;
          const dy = p.y - q.y;
          const distSq = dx * dx + dy * dy;

          if (distSq < maxSq) {
            const alphaLine = (1 - distSq / maxSq) * 0.25 * p.life * q.life;

            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(q.x, q.y);
            ctx.strokeStyle = `hsla(${(p.hue + q.hue) * 0.5},100%,60%,${alphaLine})`;
            ctx.stroke();

            lineCount++;
            if (lineCount > LINE_BUDGET) return;
          }
        }
      }
    }
  }
}

function drawBackgroundVeil() {
  const fade = Number(fadeInput.value) / 100;
  ctx.fillStyle = `rgba(0,0,0,${fade})`;
  ctx.fillRect(0, 0, w, h);

  if (frame % 2 === 0) {
    const cx = w / 2 + Math.cos(frame * 0.006) * w * 0.2;
    const cy = h / 2 + Math.sin(frame * 0.007) * h * 0.2;
    const r = Math.max(w, h) * 0.42;

    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, `hsla(${hue + 180},100%,30%,0.045)`);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }
}

function draw() {
  frame++;
  hue = (hue + 0.47) % 360;

  drawBackgroundVeil();

  if (auto) autoMotion();

  drawForms();
  drawBolts();
  drawSparks();
  drawParticlesAndLinks();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
