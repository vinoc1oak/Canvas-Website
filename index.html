<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stable Audio Reactive Field</title>

<style>
html,body{margin:0;height:100%;overflow:hidden;background:#000;touch-action:none;font-family:Arial,sans-serif}
canvas{position:fixed;inset:0;display:block}
#menuBtn{position:fixed;top:14px;right:14px;z-index:20;width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.45);color:white;font-size:24px}
#panel{position:fixed;top:70px;right:14px;z-index:20;width:250px;padding:14px;border-radius:16px;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.18);color:white;display:none}
#panel.open{display:block}
label{font-size:12px;color:#bbb;display:block;margin-top:10px}
input,button{width:100%;margin-top:6px}
button{padding:9px;border:none;border-radius:10px;font-weight:bold}
#player{position:fixed;left:12px;bottom:12px;z-index:30;width:290px;height:42px;opacity:.95;pointer-events:auto;touch-action:auto}
.status{font-size:11px;color:#aaa;margin-top:10px;line-height:1.35}
</style>
</head>

<body>
<canvas id="canvas"></canvas>
<button id="menuBtn">☰</button>
<audio id="player" controls playsinline></audio>

<div id="panel">
  <strong>STABLE AUDIO FIELD</strong>

  <label>Upload MP3</label>
  <input id="fileInput" type="file" accept="audio/*">

  <label>Visual Intensity</label>
  <input id="intensity" type="range" min="70" max="150" value="105">

  <label>Trail Fade</label>
  <input id="fade" type="range" min="5" max="18" value="8">

  <label>Particle Limit</label>
  <input id="limit" type="range" min="180" max="460" value="310">

  <button id="clearBtn">Clear</button>

  <div id="status" class="status">Upload a song, then press play on the audio bar.</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { alpha:false });

const menuBtn = document.getElementById("menuBtn");
const panel = document.getElementById("panel");
const fileInput = document.getElementById("fileInput");
const player = document.getElementById("player");
const statusEl = document.getElementById("status");
const clearBtn = document.getElementById("clearBtn");
const fadeSlider = document.getElementById("fade");
const intensitySlider = document.getElementById("intensity");
const limitSlider = document.getElementById("limit");

let w,h,dpr,frame=0,hue=0;
let audioCtx=null, analyser=null, sourceNode=null, freq=null;
let bass=0,mids=0,highs=0,vol=0;
let sb=0,sm=0,sh=0,sv=0,buildup=0;
let beatCooldown=0,lastBeatFrame=0,lastVisualFrame=0;
let energyHistory=[];

const particles=[], rings=[], bolts=[], sparks=[];
const MAX_RINGS=24, MAX_BOLTS=10, MAX_SPARKS=70, LINE_BUDGET=1250;

let pointerDown=false,lastX=null,lastY=null,lastManual=-999;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,1.45);
  w=innerWidth; h=innerHeight;
  canvas.width=Math.floor(w*dpr);
  canvas.height=Math.floor(h*dpr);
  canvas.style.width=w+"px";
  canvas.style.height=h+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,w,h);
}

resize();
addEventListener("resize",resize);

menuBtn.onclick=()=>panel.classList.toggle("open");

clearBtn.onclick=()=>{
  particles.length=0; rings.length=0; bolts.length=0; sparks.length=0;
  ctx.fillStyle="#000"; ctx.fillRect(0,0,w,h);
};

function rand(a,b){return a+Math.random()*(b-a)}
function trim(arr,max){if(arr.length>max)arr.splice(0,arr.length-max)}
function capParticles(){const max=Number(limitSlider.value); if(particles.length>max)particles.splice(0,particles.length-max)}

fileInput.onchange=e=>{
  const file=e.target.files[0];
  if(!file)return;
  player.src=URL.createObjectURL(file);
  player.load();
  statusEl.textContent="Loaded. Press play on the audio bar.";
};

async function setupAudio(){
  if(analyser)return;

  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=1024;
  analyser.smoothingTimeConstant=.72;

  sourceNode=audioCtx.createMediaElementSource(player);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  freq=new Uint8Array(analyser.frequencyBinCount);
}

player.addEventListener("play",async()=>{
  try{
    await setupAudio();
    if(audioCtx.state==="suspended") await audioCtx.resume();
    statusEl.textContent="Playing. Visuals are locked to the live audio stream.";
  }catch(e){
    statusEl.textContent="Playing. Visuals are using safe fallback mode.";
  }
});

player.addEventListener("pause",()=>statusEl.textContent="Paused.");

function addParticle(x,y,vx,vy,life,color,spin=0){
  particles.push({x,y,px:x,py:y,vx,vy,life,maxLife:life,hue:color,spin});
}

function addSpark(x,y,vx,vy,life,color){
  sparks.push({x,y,px:x,py:y,vx,vy,life,hue:color});
  trim(sparks,MAX_SPARKS);
}

function addRing(x,y,speed,color,life=1){
  rings.push({x,y,r:3,speed,life,hue:color,phase:rand(0,Math.PI*2),spin:Math.random()<.5?-1:1});
  trim(rings,MAX_RINGS);
}

function addFlow(x,y,amount=1){
  for(let i=0;i<amount;i++){
    const a=rand(0,Math.PI*2);
    const s=rand(.25,1.25+sb*1.7);
    addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(.75,1.2),hue+rand(0,90));
  }
}

function bloom(x,y,power=1){
  const count=Math.floor(22+power*18);
  for(let i=0;i<count;i++){
    const a=Math.PI*2*i/count+rand(-.06,.06);
    const s=rand(1.4,3.9+power*2);
    addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(.9,1.35),hue+i*5);
  }
  addRing(x,y,3.8+power*1.6,hue+210,.85);
}

function spiral(x,y,power=1){
  const dir=Math.random()<.5?1:-1;
  for(let i=0;i<28;i++){
    const a=i*.52*dir;
    const s=.75+i*.034+power*.32;
    addParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(1.05,1.75),hue+i*7,dir*.018);
  }
  addRing(x,y,2.6+power,hue+60,.95);
}

function lightning(x,y,power=1){
  const base=hue+rand(180,245);
  const branches=Math.floor(4+power*4);

  for(let b=0;b<branches;b++){
    let cx=x,cy=y,angle=rand(0,Math.PI*2);
    const length=rand(80,145+power*55);
    const points=[{x:cx,y:cy}];

    for(let i=0;i<7;i++){
      angle+=rand(-.48,.48);
      cx+=Math.cos(angle)*length/7+rand(-13,13);
      cy+=Math.sin(angle)*length/7+rand(-13,13);
      points.push({x:cx,y:cy});
    }

    bolts.push({points,life:rand(.55,.9),hue:base,width:rand(1,2.1)});
  }

  for(let i=0;i<24+power*18;i++){
    const a=rand(0,Math.PI*2),s=rand(2.4,6.5+power*1.6);
    addSpark(x,y,Math.cos(a)*s,Math.sin(a)*s,rand(.35,.78),base+rand(-60,60));
  }

  addRing(x,y,5.5+power*1.7,base,.6);
  trim(bolts,MAX_BOLTS);
}

function randomEffect(x,y,power=1){
  const r=Math.random();
  if(r<.36)bloom(x,y,power);
  else if(r<.7)spiral(x,y,power);
  else lightning(x,y,power);
  lastVisualFrame=frame;
  capParticles();
}

function analyzeAudio(){
  if(player.paused){
    sb*=.94; sm*=.94; sh*=.94; sv*=.94; buildup*=.97;
    return false;
  }

  let hasLiveData=false;

  if(analyser&&freq){
    analyser.getByteFrequencyData(freq);

    let b=0,m=0,hi=0,total=0;

    for(let i=0;i<freq.length;i++){
      const v=freq[i]/255;
      total+=v;
      if(i<12)b+=v;
      else if(i<90)m+=v;
      else hi+=v;
    }

    bass=b/12;
    mids=m/78;
    highs=hi/(freq.length-90);
    vol=total/freq.length;

    hasLiveData=vol>.004 || bass>.004 || mids>.004 || highs>.004;
  }

  if(!hasLiveData){
    const t=player.currentTime||frame/60;
    bass=.22+.18*Math.abs(Math.sin(t*2.7));
    mids=.16+.14*Math.abs(Math.sin(t*1.65+.8));
    highs=.12+.18*Math.abs(Math.sin(t*5.4+1.6));
    vol=(bass+mids+highs)/3;
  }

  sb=sb*.78+bass*.22;
  sm=sm*.84+mids*.16;
  sh=sh*.78+highs*.22;
  sv=sv*.86+vol*.14;

  const energy=sv*.75+sb*.95+sh*.25;
  energyHistory.push(energy);
  if(energyHistory.length>64)energyHistory.shift();

  let avg=0;
  for(let i=0;i<energyHistory.length;i++)avg+=energyHistory[i];
  avg/=energyHistory.length||1;

  buildup=buildup*.985+Math.max(0,energy-avg)*.16+sv*.007;
  buildup=Math.min(1.5,buildup);

  beatCooldown--;

  const beat=beatCooldown<=0 && energy>Math.max(.14,avg*1.22);

  if(beat){
    beatCooldown=12;
    lastBeatFrame=frame;
  }

  return beat;
}

function musicVisuals(beat){
  if(player.paused)return;

  const power=Math.min(2.6,.75+sb*2.6+buildup);
  const cx=w/2+Math.cos(frame*.012)*w*.28;
  const cy=h/2+Math.sin(frame*.014)*h*.28;

  if(frame%2===0){
    addFlow(cx+rand(-90,90),cy+rand(-90,90),sh>.18?2:1);
    lastVisualFrame=frame;
  }

  if(beat){
    randomEffect(rand(w*.16,w*.84),rand(h*.16,h*.84),power);
  }

  if(sb>.3&&frame%42===0)bloom(rand(w*.18,w*.82),rand(h*.18,h*.82),power);
  if(buildup>.5&&frame%58===0)lightning(rand(w*.18,w*.82),rand(h*.18,h*.82),power);

  if(frame-lastVisualFrame>30){
    randomEffect(rand(w*.2,w*.8),rand(h*.2,h*.8),1.2);
  }

  capParticles();
}

function manualMove(x,y){
  if(lastX!==null){
    const dx=x-lastX,dy=y-lastY,dist=Math.hypot(dx,dy);
    if(dist>5){
      const steps=Math.min(4,Math.floor(dist/24)+1);
      for(let i=0;i<steps;i++){
        const t=i/steps;
        addFlow(lastX+dx*t,lastY+dy*t,1);
      }
      if(pointerDown&&frame-lastManual>16&&Math.random()<.08){
        randomEffect(x,y,1);
        lastManual=frame;
      }
      capParticles();
    }
  }
  lastX=x; lastY=y;
}

addEventListener("pointerdown",e=>{
  if(e.target.closest("#panel")||e.target.closest("#menuBtn")||e.target.closest("#player"))return;
  pointerDown=true; lastX=e.clientX; lastY=e.clientY;
  randomEffect(e.clientX,e.clientY,1);
});

addEventListener("pointermove",e=>{
  if(e.target.closest("#panel")||e.target.closest("#menuBtn")||e.target.closest("#player"))return;
  manualMove(e.clientX,e.clientY);
});

addEventListener("pointerup",()=>{pointerDown=false;lastX=null;lastY=null});
addEventListener("pointercancel",()=>{pointerDown=false;lastX=null;lastY=null});

function drawBackground(){
  const fade=Number(fadeSlider.value)/100;
  ctx.fillStyle=`rgba(0,0,0,${fade})`;
  ctx.fillRect(0,0,w,h);

  if(frame%2===0){
    const glow=.032+sb*.1+buildup*.035;
    const g=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*.56);
    g.addColorStop(0,`hsla(${hue+160},100%,32%,${glow})`);
    g.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,w,h);
  }
}

function drawRings(){
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];
    r.r+=r.speed*(1+sb*.6);
    r.life-=.009;

    if(r.life<=0||r.r>Math.max(w,h)*.75){
      rings[i]=rings[rings.length-1];rings.pop();continue;
    }

    const wobble=Math.sin(frame*.035+r.phase)*(7+sm*14);

    ctx.beginPath();
    ctx.arc(r.x,r.y,r.r+wobble,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${r.hue},100%,64%,${r.life*.5})`;
    ctx.lineWidth=1.2+sb;
    ctx.stroke();

    const start=frame*.035*r.spin+r.phase;
    ctx.beginPath();
    ctx.arc(r.x,r.y,r.r*.64,start,start+Math.PI*1.35);
    ctx.strokeStyle=`hsla(${r.hue+85},100%,60%,${r.life*.28})`;
    ctx.lineWidth=1;
    ctx.stroke();
  }
}

function drawBolts(){
  for(let i=bolts.length-1;i>=0;i--){
    const b=bolts[i];
    b.life-=.055;

    if(b.life<=0){
      bolts[i]=bolts[bolts.length-1];bolts.pop();continue;
    }

    ctx.beginPath();
    ctx.moveTo(b.points[0].x,b.points[0].y);

    for(let j=1;j<b.points.length;j++){
      const p=b.points[j];
      ctx.lineTo(p.x+rand(-2,2),p.y+rand(-2,2));
    }

    ctx.strokeStyle=`hsla(${b.hue},100%,72%,${b.life*.72})`;
    ctx.lineWidth=b.width+sb;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(b.points[0].x,b.points[0].y);

    for(let j=1;j<b.points.length;j++){
      const p=b.points[j];
      ctx.lineTo(p.x+rand(-.7,.7),p.y+rand(-.7,.7));
    }

    ctx.strokeStyle=`rgba(255,255,255,${b.life*.38})`;
    ctx.lineWidth=.5;
    ctx.stroke();
  }
}

function drawSparks(){
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.px=s.x; s.py=s.y;
    s.x+=s.vx; s.y+=s.vy;
    s.vx*=.94; s.vy*=.94;
    s.life-=.038;

    if(s.life<=0){
      sparks[i]=sparks[sparks.length-1];sparks.pop();continue;
    }

    ctx.beginPath();
    ctx.moveTo(s.px,s.py);
    ctx.lineTo(s.x,s.y);
    ctx.strokeStyle=`hsla(${s.hue},100%,70%,${s.life})`;
    ctx.lineWidth=1.1;
    ctx.stroke();
  }
}

function drawParticles(){
  const baseDist=104*(Number(intensitySlider.value)/100);
  const maxDist=baseDist*(1+sm*.22);
  const maxSq=maxDist*maxDist;
  const cellSize=maxDist;
  const grid=new Map();
  let write=0;

  for(let read=0;read<particles.length;read++){
    const p=particles[read];
    p.px=p.x; p.py=p.y;

    if(p.spin){
      const c=Math.cos(p.spin),s=Math.sin(p.spin);
      const vx=p.vx*c-p.vy*s;
      const vy=p.vx*s+p.vy*c;
      p.vx=vx; p.vy=vy;
    }

    p.x+=p.vx*(1+sb*.22);
    p.y+=p.vy*(1+sb*.22);
    p.vx*=.989; p.vy*=.989;
    p.life-=.0065;

    if(p.life>0&&p.x>-100&&p.x<w+100&&p.y>-100&&p.y<h+100){
      particles[write]=p;
      const key=Math.floor(p.x/cellSize)+","+Math.floor(p.y/cellSize);
      let bucket=grid.get(key);
      if(!bucket){bucket=[];grid.set(key,bucket)}
      bucket.push(write);
      write++;
    }
  }

  particles.length=write;
  let lines=0;

  for(let i=0;i<particles.length;i++){
    const p=particles[i];
    const alpha=Math.min(1,p.life/p.maxLife);

    ctx.beginPath();
    ctx.moveTo(p.px,p.py);
    ctx.lineTo(p.x,p.y);
    ctx.strokeStyle=`hsla(${p.hue},100%,64%,${alpha*.7})`;
    ctx.lineWidth=1;
    ctx.stroke();

    const cx=Math.floor(p.x/cellSize);
    const cy=Math.floor(p.y/cellSize);

    for(let gx=cx-1;gx<=cx+1;gx++){
      for(let gy=cy-1;gy<=cy+1;gy++){
        const bucket=grid.get(gx+","+gy);
        if(!bucket)continue;

        for(let k=0;k<bucket.length;k++){
          const j=bucket[k];
          if(j<=i)continue;

          const q=particles[j];
          const dx=p.x-q.x,dy=p.y-q.y;
          const d=dx*dx+dy*dy;

          if(d<maxSq){
            const a=(1-d/maxSq)*.22*p.life*q.life;
            ctx.beginPath();
            ctx.moveTo(p.x,p.y);
            ctx.lineTo(q.x,q.y);
            ctx.strokeStyle=`hsla(${(p.hue+q.hue)/2},100%,60%,${a})`;
            ctx.lineWidth=1;
            ctx.stroke();

            lines++;
            if(lines>LINE_BUDGET)return;
          }
        }
      }
    }
  }
}

function draw(){
  frame++;
  hue=(hue+.4+sh*1.3)%360;

  const beat=analyzeAudio();

  drawBackground();
  musicVisuals(beat);
  drawRings();
  drawBolts();
  drawSparks();
  drawParticles();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
