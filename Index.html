<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Line Playground</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #020202;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    .panel {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 2;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      padding: 14px;
      backdrop-filter: blur(10px);
      max-width: 280px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 1px;
    }

    p {
      margin: 4px 0 12px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }

    button, input {
      width: 100%;
      margin-top: 8px;
    }

    button {
      background: white;
      color: black;
      border: none;
      padding: 9px 12px;
      border-radius: 10px;
      font-weight: bold;
    }

    label {
      font-size: 12px;
      color: #ddd;
    }

    .hint {
      position: fixed;
      bottom: 14px;
      right: 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      z-index: 2;
    }
  </style>
</head>

<body>
<canvas id="canvas"></canvas>

<div class="panel">
  <h1>NEON LINE PLAYGROUND</h1>
  <p>Move your finger or mouse. Tap to create shockwaves. Use the controls to change the energy.</p>

  <label>Line Distance</label>
  <input id="distance" type="range" min="50" max="220" value="130">

  <label>Trail Fade</label>
  <input id="fade" type="range" min="2" max="20" value="8">

  <button id="autoBtn">Toggle Auto Mode</button>
  <button id="clearBtn">Clear Canvas</button>
  <button id="saveBtn">Save Image</button>
</div>

<div class="hint">
  Tap = burst · Move = draw · Space = auto mode
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const distanceSlider = document.getElementById("distance");
const fadeSlider = document.getElementById("fade");
const autoBtn = document.getElementById("autoBtn");
const clearBtn = document.getElementById("clearBtn");
const saveBtn = document.getElementById("saveBtn");

let w, h, points = [];
let autoMode = true;
let hue = 0;
let pointer = { x: innerWidth / 2, y: innerHeight / 2 };
let time = 0;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

function addPoint(x, y, burst = false) {
  const amount = burst ? 28 : 3;

  for (let i = 0; i < amount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = burst ? Math.random() * 6 + 1 : Math.random() * 2;

    points.push({
      x,
      y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      size: burst ? Math.random() * 3 + 1 : 1,
      hue: hue + Math.random() * 80
    });
  }

  if (points.length > 600) {
    points.splice(0, points.length - 600);
  }
}

function handleMove(x, y) {
  pointer.x = x;
  pointer.y = y;
  addPoint(x, y, false);
}

window.addEventListener("mousemove", e => {
  handleMove(e.clientX, e.clientY);
});

window.addEventListener("touchmove", e => {
  e.preventDefault();
  const t = e.touches[0];
  handleMove(t.clientX, t.clientY);
}, { passive: false });

window.addEventListener("click", e => {
  addPoint(e.clientX, e.clientY, true);
});

window.addEventListener("touchstart", e => {
  const t = e.touches[0];
  addPoint(t.clientX, t.clientY, true);
});

window.addEventListener("keydown", e => {
  if (e.code === "Space") {
    autoMode = !autoMode;
  }
});

autoBtn.onclick = () => autoMode = !autoMode;

clearBtn.onclick = () => {
  points = [];
  ctx.clearRect(0, 0, w, h);
};

saveBtn.onclick = () => {
  const link = document.createElement("a");
  link.download = "neon-line-art.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
};

function autoDraw() {
  const x = w / 2 + Math.cos(time * 0.018) * w * 0.32 + Math.sin(time * 0.041) * 120;
  const y = h / 2 + Math.sin(time * 0.022) * h * 0.32 + Math.cos(time * 0.033) * 120;
  addPoint(x, y, false);

  if (time % 90 === 0) addPoint(x, y, true);
}

function animate() {
  time++;
  hue += 0.7;

  const fadeAmount = fadeSlider.value / 100;
  ctx.fillStyle = `rgba(2, 2, 2, ${fadeAmount})`;
  ctx.fillRect(0, 0, w, h);

  if (autoMode) autoDraw();

  const maxDist = Number(distanceSlider.value);

  for (let i = 0; i < points.length; i++) {
    const p = points[i];

    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.992;
    p.vy *= 0.992;
    p.life -= 0.006;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life})`;
    ctx.fill();

    for (let j = i + 1; j < points.length; j++) {
      const q = points[j];
      const dx = p.x - q.x;
      const dy = p.y - q.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < maxDist) {
        const alpha = (1 - dist / maxDist) * p.life * q.life;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `hsla(${(p.hue + q.hue) / 2}, 100%, 60%, ${alpha})`;
        ctx.lineWidth = 1.2;
        ctx.shadowBlur = 12;
        ctx.shadowColor = `hsl(${p.hue}, 100%, 60%)`;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }
  }

  points = points.filter(p => p.life > 0);

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
